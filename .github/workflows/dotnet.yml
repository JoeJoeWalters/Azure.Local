# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build And Test
permissions:
  contents: read
  actions: read
  statuses: write

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 20
    - name: Restore Dependencies
      run: dotnet restore ./Azure.Local.slnx
    - name: Build Project
      run: dotnet build ./Azure.Local.slnx --no-restore
#      with:
#        dotnet-version: 10.0.x
    - name: Generate OpenAPI 3.1 Spec
      shell: bash
      run: |
        set -euo pipefail
        OPENAPI_DIR="${{ github.workspace }}/openapi"
        mkdir -p "$OPENAPI_DIR"

        export ASPNETCORE_ENVIRONMENT=Development
        dotnet run --project ./src/Azure.Local.ApiService/Azure.Local.ApiService.csproj --no-build --urls http://127.0.0.1:5067 > "$OPENAPI_DIR/apiservice.log" 2>&1 &
        API_PID=$!
        trap 'kill $API_PID || true' EXIT

        for i in {1..60}; do
          if curl --silent --show-error --fail "http://127.0.0.1:5067/openapi/v1.json" -o "$OPENAPI_DIR/openapi.v1.json"; then
            break
          fi
          sleep 1
        done

        if [ ! -s "$OPENAPI_DIR/openapi.v1.json" ]; then
          echo "OpenAPI document was not generated."
          tail -n 200 "$OPENAPI_DIR/apiservice.log" || true
          exit 1
        fi

        python - <<'PY'
        import json
        from pathlib import Path

        doc_path = Path("${{ github.workspace }}/openapi/openapi.v1.json")
        doc = json.loads(doc_path.read_text(encoding="utf-8"))
        version = str(doc.get("openapi", ""))
        if not version.startswith("3.1"):
          raise SystemExit(f"Expected OpenAPI 3.1.x but got '{version}'")
        print(f"Generated OpenAPI version: {version}")
        PY

    - name: Generate OpenAPI HTML
      shell: bash
      run: |
        npx --yes @redocly/cli@latest build-docs "${{ github.workspace }}/openapi/openapi.v1.json" --output "${{ github.workspace }}/openapi/openapi.v1.html"
    - name: Upload OpenAPI Json Artifact
      uses: actions/upload-artifact@v7
      with:
          name: openapi-spec
          path: ${{ github.workspace }}/openapi/openapi.v1.json
    - name: Upload OpenAPI Html Artifact
      uses: actions/upload-artifact@v7
      with:
          name: openapi-html
          path: ${{ github.workspace }}/openapi/openapi.v1.html
    - name: Run Tests
      run: dotnet test ./tests/Azure.Local.Tests/Azure.Local.Tests.csproj --verbosity detailed --logger trx --results-directory ${{ github.workspace }}/unittests
    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      with:
          name: unittestresults
          path: ${{ github.workspace }}/unittests    
    - name: Run Tests For Coverage
      run: dotnet test ./tests/Azure.Local.Tests/Azure.Local.Tests.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ${{ github.workspace }}/coverage --settings:./codecoverage.runsettings      
    - name: Combine Coverage Reports as Cobertura # This is because one report is produced per project, and we want one result for all of them.
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
      with:
        reports: "**/*.cobertura.xml" # REQUIRED # The coverage reports that should be parsed (separated by semicolon). Globbing is supported.
        targetdir: "${{ github.workspace }}" # REQUIRED # The directory where the generated report should be saved.
        reporttypes: "Cobertura" # The output formats and scope (separated by semicolon) Values: Badges, Clover, Cobertura, CsvSummary, Html, Html_Dark, Html_Light, Html_BlueRed, HtmlChart, HtmlInline, HtmlInline_AzurePipelines, HtmlInline_AzurePipelines_Dark, HtmlInline_AzurePipelines_Light, HtmlSummary, JsonSummary, Latex, LatexSummary, lcov, MarkdownSummary, MarkdownSummaryGithub, MarkdownDeltaSummary, MHtml, PngChart, SonarQube, TeamCitySummary, TextSummary, TextDeltaSummary, Xml, XmlSummary
        verbosity: "Info" # The verbosity level of the log messages. Values: Verbose, Info, Warning, Error, Off
        title: "Code Coverage Xml" # Optional title.
        tag: "${{ github.run_number }}_${{ github.run_id }}" # Optional tag or build version.
        customSettings: "" # Optional custom settings (separated by semicolon). See: https://github.com/danielpalme/ReportGenerator/wiki/Settings.
        toolpath: "reportgeneratortool" # Default directory for installing the dotnet tool.
    - name: Combine Coverage Reports as Html # This is because one report is produced per project, and we want one result for all of them.
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
      with:
        reports: "**/*.cobertura.xml" # REQUIRED # The coverage reports that should be parsed (separated by semicolon). Globbing is supported.
        targetdir: "${{ github.workspace }}/codecoverage" # REQUIRED # The directory where the generated report should be saved.
        reporttypes: "Html" # The output formats and scope (separated by semicolon) Values: Badges, Clover, Cobertura, CsvSummary, Html, Html_Dark, Html_Light, Html_BlueRed, HtmlChart, HtmlInline, HtmlInline_AzurePipelines, HtmlInline_AzurePipelines_Dark, HtmlInline_AzurePipelines_Light, HtmlSummary, JsonSummary, Latex, LatexSummary, lcov, MarkdownSummary, MarkdownSummaryGithub, MarkdownDeltaSummary, MHtml, PngChart, SonarQube, TeamCitySummary, TextSummary, TextDeltaSummary, Xml, XmlSummary
        verbosity: "Verbose" # The verbosity level of the log messages. Values: Verbose, Info, Warning, Error, Off
        title: "Code Coverage Html" # Optional title.
        tag: "${{ github.run_number }}_${{ github.run_id }}" # Optional tag or build version.
        customSettings: "" # Optional custom settings (separated by semicolon). See: https://github.com/danielpalme/ReportGenerator/wiki/Settings.
        toolpath: "reportgeneratortool" # Default directory for installing the dotnet tool.
        classfilters: "-System.Runtime.CompilerServices;-Microsoft.AspNetCore.OpenApi.Generated;-AutoGeneratedProgram;-Azure.Local.ApiService.Tests.Component.*;-*.TestHelper;-*.ApplicationUnitTests"
    - name: Upload Combined Artifact Of Xml Code Coverage Report
      uses: actions/upload-artifact@v7
      with:
          name: code-coverage-report-cobertura
          path: ${{ github.workspace }}/Cobertura.xml
    - name: Upload Combined Artifact Of Cobutura Code Coverage Report
      uses: actions/upload-artifact@v7
      with:
          name: code-coverage-report-html
          path: ${{ github.workspace }}/codecoverage
    - name: Generate Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'
#    - name: Add Coverage PR Comment
#      uses: marocchino/sticky-pull-request-comment@v2
#      with:
#        recreate: true
#        path: code-coverage-results.md
    - name: Write Code Coverage To Job Summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
